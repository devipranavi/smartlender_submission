<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Lender</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
  .stage {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  .passbook {
    width: 100%;
    max-width: 620px;
    background: var(--ink);
    color: var(--paper);
    border-radius: 6px;
    padding: 56px 52px 48px;
    box-shadow: 0 24px 60px rgba(27,36,48,0.35), 0 2px 0 var(--brass);
    position: relative;
    overflow: hidden;
  }

  .passbook::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(135deg, rgba(184,146,74,0.04) 0 2px, transparent 2px 14px);
    pointer-events: none;
  }

  .ref {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--brass);
    text-transform: uppercase;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    animation-delay: 0.1s;
  }

  h1 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: clamp(40px, 6vw, 56px);
    line-height: 1.05;
    margin: 0 0 18px;
    letter-spacing: -0.01em;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards;
    animation-delay: 0.22s;
  }

  h1 em {
    font-style: italic;
    color: var(--brass);
  }

  .lede {
    font-size: 16px;
    line-height: 1.6;
    color: #C9CEDA;
    max-width: 420px;
    margin: 0 0 36px;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards;
    animation-delay: 0.34s;
  }

  /* signature element: the ledger rule draws itself in on load */
  .rule {
    position: relative;
    height: 1px;
    background: rgba(255,255,255,0.12);
    margin: 0 0 36px;
    overflow: hidden;
  }
  .rule::after {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--brass);
    transform: scaleX(0);
    transform-origin: left;
    animation: drawLine 0.9s cubic-bezier(.2,.8,.2,1) forwards;
    animation-delay: 0.5s;
  }

  .stats {
    display: flex;
    gap: 36px;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards;
    animation-delay: 0.62s;
  }
  .stat .num {
    font-family: var(--serif);
    font-size: 28px;
    color: var(--brass);
    line-height: 1;
  }
  .stat .label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #8B93A3;
    margin-top: 6px;
  }

  .cta-row {
    opacity: 0;
    animation: fadeUp 0.7s ease forwards;
    animation-delay: 0.78s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes drawLine {
    to { transform: scaleX(1); }
  }

  @media (prefers-reduced-motion: reduce) {
    .ref, h1, .lede, .stats, .cta-row { opacity: 1; animation: none; }
    .rule::after { transform: scaleX(1); animation: none; }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="passbook">
      <div class="ref">Ledger No. SL-2026 · Automated Credit Review</div>
      <h1>Smart<br><em>Lender</em></h1>
      <p class="lede">A model-backed second opinion on loan applications — built to read income, history, and risk the way a careful credit officer would, in under a second.</p>

      <div class="rule"></div>

      <div class="stats">
        <div class="stat">
          <div class="num">82%</div>
          <div class="label">Test Accuracy</div>
        </div>
        <div class="stat">
          <div class="num">4</div>
          <div class="label">Models Compared</div>
        </div>
        <div class="stat">
          <div class="num">&lt;1s</div>
          <div class="label">Per Decision</div>
        </div>
      </div>

      <div class="cta-row">
        <a class="btn btn-brass" href="/predict">Begin Application →</a>
      </div>
    </div>
  </div>
</body>
</html>
